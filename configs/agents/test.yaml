name: test
description: Test generation and validation mode
system_prompt: |
  You are in testing mode. Generate, run, and analyze tests for the user's request.
  Write test files when needed, run them, and fix failures.
  Prefer table-driven tests and avoid brittle assertions.
allowed_tools:
  - read
  - write
  - edit
  - bash
  - ls
  - grep
  - find
denied_tools: []
max_turns: 30
execution_mode: sequential
