# Single source of truth for user-declared model metadata. Lcoder loads this
# file at startup and merges its entries into the in-process model catalog as
# explicit overrides (highest priority over the models.dev snapshot). When the
# file is absent, Lcoder falls back to its built-in catalog defaults.
#
# pricing is in USD per 1,000,000 tokens. budget is optional; when omitted the
# Go context manager derives target/reserve from context_window.
models:
  - id: gpt-4o
    provider: openai
    aliases: [4o]
    capabilities: [tools, vision, streaming]
    context_window: 128000
    budget:
      target: 120000
      reserve_output: 8192
    pricing:
      prompt: 2.50
      completion: 10.00
      cache_read: 1.25
      cache_write: 2.50

  - id: gpt-4o-mini
    provider: openai
    aliases: [4o-mini]
    capabilities: [tools, vision, streaming]
    context_window: 128000
    budget:
      target: 120000
      reserve_output: 8192
    pricing:
      prompt: 0.15
      completion: 0.60
      cache_read: 0.075
      cache_write: 0.15

  - id: claude-sonnet-4-20250514
    provider: anthropic
    aliases: [sonnet, claude-sonnet-4]
    capabilities: [tools, vision, streaming]
    context_window: 200000
    budget:
      target: 180000
      reserve_output: 8192
    pricing:
      prompt: 3.00
      completion: 15.00
      cache_read: 0.30
      cache_write: 3.75

  - id: deepseek-chat
    provider: deepseek
    aliases: [deepseek]
    capabilities: [tools, streaming]
    context_window: 64000
    budget:
      target: 60000
      reserve_output: 8192
    pricing:
      prompt: 0.27
      completion: 1.10
      cache_read: 0.10
      cache_write: 0.27

  - id: deepseek-reasoner
    provider: deepseek
    aliases: [deepseek-r1]
    capabilities: [streaming]
    context_window: 64000
    budget:
      target: 60000
      reserve_output: 8192
    pricing:
      prompt: 0.55
      completion: 2.19
      cache_read: 0.14
      cache_write: 0.55
