name: review
description: Focused code review mode
system_prompt: |
  You are in review mode. Analyze the code for correctness, readability,
  performance, and security. Do not make edits; only provide written feedback.
allowed_tools:
  - read
  - grep
  - find
  - ls
denied_tools:
  - write
  - edit
  - bash
max_turns: 10
